components:
  schemas:
    AggregationSpec:
      properties:
        operator:
          type: string
          enum:
          - avg
          - sum
          - min
          - max
          title: Operator
        field:
          type: string
          minLength: 1
          title: Field
      type: object
      required:
      - operator
      - field
      title: AggregationSpec
      description: Aggregation operator and source field.
    ChartData:
      properties:
        source:
          type: string
          enum:
          - tasks
          - workflows
          - objects
          title: Source
          default: tasks
        filter:
          additionalProperties: true
          type: object
          title: Filter
        group_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Group By
        metrics:
          anyOf:
          - items:
              $ref: '#/components/schemas/MetricSpec'
            type: array
          - type: 'null'
          title: Metrics
        x:
          anyOf:
          - type: string
          - type: 'null'
          title: X
        y:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Y
        sort:
          anyOf:
          - items:
              $ref: '#/components/schemas/SortSpec'
            type: array
          - type: 'null'
          title: Sort
        limit:
          type: integer
          maximum: 5000.0
          minimum: 1.0
          title: Limit
          default: 500
      type: object
      title: ChartData
      description: 'Declarative data binding for a chart: what to query and how to
        shape it.'
    ChartDataRequest:
      properties:
        data:
          $ref: '#/components/schemas/ChartData'
        context:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Context
      type: object
      required:
      - data
      title: ChartDataRequest
      description: Request body for the declarative chart-data resolver.
    ChatMessage:
      properties:
        role:
          type: string
          title: Role
        content:
          type: string
          title: Content
      type: object
      required:
      - role
      - content
      title: ChatMessage
      description: One conversation message.
    ChatRequest:
      properties:
        messages:
          items:
            $ref: '#/components/schemas/ChatMessage'
          type: array
          minItems: 1
          title: Messages
        context:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Context
        stream:
          type: boolean
          title: Stream
          default: true
        allow_dashboard_edit:
          type: boolean
          title: Allow Dashboard Edit
          default: false
      type: object
      required:
      - messages
      title: ChatRequest
      description: 'Chat request: client-passed history plus UI context.'
    DashboardChart:
      properties:
        chart_id:
          type: string
          title: Chart Id
        type:
          type: string
          enum:
          - chart
          - metric
          - table
          - markdown
          title: Type
        title:
          type: string
          title: Title
          default: ''
        live:
          type: boolean
          title: Live
          default: false
        refresh_interval_sec:
          anyOf:
          - type: number
          - type: 'null'
          title: Refresh Interval Sec
        data:
          anyOf:
          - $ref: '#/components/schemas/ChartData'
          - type: 'null'
        viz:
          anyOf:
          - $ref: '#/components/schemas/VizSpec'
          - type: 'null'
        content:
          anyOf:
          - type: string
          - type: 'null'
          title: Content
      type: object
      required:
      - chart_id
      - type
      title: DashboardChart
      description: One chart inside a dashboard.
    DashboardConfig:
      properties:
        dashboard_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Dashboard Id
        dashboard_type:
          type: string
          enum:
          - common_workflow
          - common_campaign
          - custom_workflow
          - custom_campaign
          title: Dashboard Type
          default: common_workflow
        target:
          anyOf:
          - type: string
          - type: 'null'
          title: Target
        name:
          type: string
          title: Name
          default: ''
        description:
          type: string
          title: Description
          default: ''
        context:
          additionalProperties: true
          type: object
          title: Context
        charts:
          items:
            $ref: '#/components/schemas/DashboardChart'
          type: array
          title: Charts
        layout:
          items:
            $ref: '#/components/schemas/LayoutItem'
          type: array
          title: Layout
        created_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Created At
        updated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Updated At
      type: object
      title: DashboardConfig
      description: "A dashboard configuration: one of four types (common/custom \xD7\
        \ workflow/campaign).\n\n``target`` is required for custom types:\n- ``custom_workflow``:\
        \ the workflow **name** (not id) this config applies to.\n- ``custom_campaign``:\
        \ the ``campaign_id`` this config applies to.\nCommon types leave ``target``\
        \ null and apply to every workflow or campaign."
    HTTPValidationError:
