openapi: 3.1.0
info:
  title: Flowcept Webservice API
  description: Read-only REST API for Flowcept provenance data. Provides workflows,
    tasks, and objects endpoints with query support.
  version: 1.0.0
paths:
  /api/v1/health/live:
    get:
      tags:
      - health
      summary: Live
      description: Liveness check.
      operationId: live_api_v1_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Live Api V1 Health Live Get
  /api/v1/health/ready:
    get:
      tags:
      - health
      summary: Ready
      description: Readiness check.
      operationId: ready_api_v1_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Ready Api V1 Health Ready Get
  /api/v1/info:
    get:
      tags:
      - health
      summary: Info
      description: Service name and installed version.
      operationId: info_api_v1_info_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Info Api V1 Info Get
  /api/v1/campaigns:
    get:
      tags:
      - campaigns
      summary: List Campaigns
      description: List derived campaign summaries, most recently active first.
      operationId: list_campaigns_api_v1_campaigns_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/campaigns/{campaign_id}:
    get:
      tags:
      - campaigns
      summary: Get Campaign
      description: 'Get one campaign: derived summary, its workflows, and a task summary.'
      operationId: get_campaign_api_v1_campaigns__campaign_id__get
      parameters:
      - name: campaign_id
        in: path
        required: true
        schema:
          type: string
          title: Campaign Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Campaign Api V1 Campaigns  Campaign Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - campaigns
      summary: Delete Campaign
      description: Recursively delete a campaign and all its workflows, tasks, and
        objects.
      operationId: delete_campaign_api_v1_campaigns__campaign_id__delete
      parameters:
      - name: campaign_id
        in: path
        required: true
        schema:
          type: string
          title: Campaign Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Delete Campaign Api V1 Campaigns  Campaign Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/campaigns/{campaign_id}/workflow_card:
    get:
      tags:
      - campaigns
      summary: Get Campaign Workflow Card
      description: Get a campaign workflow card as structured JSON or rendered markdown.
      operationId: get_campaign_workflow_card_api_v1_campaigns__campaign_id__workflow_card_get
      parameters:
      - name: campaign_id
        in: path
        required: true
        schema:
          type: string
          title: Campaign Id
      - name: format
        in: query
        required: false
        schema:
          type: string
          default: json
          title: Format
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
