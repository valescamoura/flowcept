        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Filter Json
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
